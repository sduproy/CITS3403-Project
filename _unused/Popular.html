<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Popular Itineraries</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="../static/css/travelplan.css" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar tp-navbar">
    <div class="container">
      <a class="navbar-brand" href="#">Website Name</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container tp-section">
    <h1>Popular Itineraries</h1>
    <p class="tp-text-muted">Hottest trips from the last month.</p>

    <p>Where do you want to go?</p>
    <input type="text" id="searchInput" class="tp-input" placeholder="Search..." />

    <div class="mt-2 d-flex gap-2 flex-wrap">
      <button id="btn1" class="btn-tp-secondary">Asia</button>
      <button id="btn2" class="btn-tp-secondary">Europe</button>
      <button id="btn3" class="btn-tp-secondary">North America</button>
      <button id="btn4" class="btn-tp-secondary">South America</button>
      <button id="btn5" class="btn-tp-secondary">Oceania</button>
      <button id="btn6" class="btn-tp-secondary">Africa</button>
      <button id="btn7" class="btn-tp-ghost">✕ Clear</button>
    </div>

    <!-- CARDS -->
    <div class="row g-3 mt-2">

      <div class="col-md-4" id="card-1" data-name="asia japan tokyo kyoto">
        <div class="card tp-card tp-card-accent">
          <div class="card-body">
            <h5 class="card-title">Tokyo to Kyoto</h5>
            <p class="card-text">7 days · Japan</p>
            <a href="#" class="btn-tp-primary">View Trip</a>
          </div>
        </div>
      </div>

      <div class="col-md-4" id="card-2" data-name="europe italy amalfi">
        <div class="card tp-card tp-card-accent coral">
          <div class="card-body">
            <h5 class="card-title">Amalfi Coast</h5>
            <p class="card-text">10 days · Italy</p>
            <a href="#" class="btn-tp-primary">View Trip</a>
          </div>
        </div>
      </div>

      <div class="col-md-4" id="card-3" data-name="asia bali indonesia">
        <div class="card tp-card tp-card-accent gold">
          <div class="card-body">
            <h5 class="card-title">Bali Bliss</h5>
            <p class="card-text">8 days · Indonesia</p>
            <a href="#" class="btn-tp-primary">View Trip</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const search = document.getElementById('searchInput')
    const cards = document.querySelectorAll('.col-md-4')
    const btn1 = document.getElementById('btn1')
    const btn2 = document.getElementById('btn2')
    const btn3 = document.getElementById('btn3')
    const btn4 = document.getElementById('btn4')
    const btn5 = document.getElementById('btn5')
    const btn6 = document.getElementById('btn6')
    const btn7 = document.getElementById('btn7')

    function getcards(card, filterWord) {
      const tags = card.dataset.name
      const words = filterWord.split(' ')

      const allMatch = words.every(function(word) {
        return tags.includes(word)
      })

      if (allMatch) {
        card.style.display = ''
      } else {
        card.style.display = 'none'
      }
    }

    search.addEventListener('input', function() {
      cards.forEach(function(card) {
        getcards(card, search.value.toLowerCase())
      })
    })

    btn1.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'asia') })
    })
    btn2.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'europe') })
    })
    btn3.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'north america') })
    })
    btn4.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'south america') })
    })
    btn5.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'oceania') })
    })
    btn6.addEventListener('click', function() {
      cards.forEach(function(card) { getcards(card, 'africa') })
    })
    btn7.addEventListener('click', function() {
      cards.forEach(function(card) { card.style.display = '' })
      search.value = ''
    })
  </script>

</body>
</html>
