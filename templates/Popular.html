<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Popular Itineraries</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Website Name</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="container mt-4">
    <h1>Popular Itineraries</h1>
    <p class="text-muted">Hottest trips from the last month.</p>


    <p> Where do you want to go? </p>
    <input type="text" id="searchInput" placeholder="Search..." />


    <!-- CARDS -->
    <div class="row g-3">

      <div class="col-md-4" id="card-1" data-name = "asia japan tokyo kyoto">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Tokyo to Kyoto</h5>
            <p class="card-text">7 days · Japan</p>
            <a href="#" class="btn btn-primary">View Trip</a>
          </div>
        </div>
      </div>

      <div class="col-md-4" id="card-2" data-name="italy">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Amalfi Coast</h5>
            <p class="card-text">10 days · Italy</p>
            <a href="#" class="btn btn-primary">View Trip</a>
          </div>
        </div>
      </div>

      <div class="col-md-4" id="card-3" data-name="indonesia">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">Bali Bliss</h5>
            <p class="card-text">8 days · Indonesia</p>
            <a href="#" class="btn btn-primary">View Trip</a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"> </script>


    <script>

        const search = document.getElementById('searchInput')
        const cards = document.querySelectorAll('.col-md-4')

        function getcards(card) {
            const typed = search.value.toLowerCase().split(' ')
            const tags = card.dataset.name

            const allMatch = typed.every(function(word) {
                return tags.includes(word)
            })

            if (allMatch) {
                card.style.display = ''
            } else {
                card.style.display = 'none'
            }
        }


        search.addEventListener('input', function() {
            cards.forEach(getcards)   // forEach passes each card div correctly
        })
  </script>
</body>
</html>
